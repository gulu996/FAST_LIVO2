common:
  img_topic: "/left_camera/image"
  lid_topic: "/livox/lidar"
  imu_topic: "/livox/imu"
  img_en: 1
  lidar_en: 1
  ros_driver_bug_fix: false

extrin_calib:
  #extrinsic_T: [-0.011, -0.02329, 0.04412]
  #extrinsic_R: [1, 0, 0, 0, 1, 0, 0, 0, 1]
  #Rcl: [ -0.011008,  -0.999940,   0.000187,
  #        0.539054,  -0.006092,  -0.842250,
  #        0.842200,  -0.009171,   0.539089]
  #Pcl: [  0.086367,  -0.365243,  -0.070319]


  extrinsic_T: [0.08809, 0.01329, -0.25733]
  extrinsic_R: [-0.8090170, 0.0000, -0.5877852, 0.0000, -1.0000, 0.0000, -0.5877852, 0.0000, 0.8090170]
  Rcl: [ -0.023487,  -0.999710,   0.005250,
       -0.013503,  -0.004934,  -0.999897,
        0.999633,  -0.023556,  -0.013383]
  Pcl: [ -0.001139,  -0.161932,   0.001251]
 
time_offset: 
  imu_time_offset: 0.0
  img_time_offset: 0.1
  exposure_time_init: 0.0

preprocess:
  point_filter_num: 2
  filter_size_surf: 0.15
  lidar_type: 1 # Livox Avia LiDAR
  scan_line: 4
  blind: 0.5

vio:
  max_iterations: 5
  outlier_threshold: 1000 # 78 100 156 #100 200 500 700 infinite
  img_point_cov: 100 # 100 1000 
  patch_size: 8
  patch_pyrimid_level: 4
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: true
  inv_expo_cov: 0.1

imu:
  imu_en: true
  imu_int_frame: 30
  acc_cov: 0.8 # 0.2
  gyr_cov: 0.5 # 0.5
  b_acc_cov: 0.001 # 0.1
  b_gyr_cov: 0.001 # 0.1

lio:
  max_iterations: 5
  dept_err: 0.02
  beam_err: 0.15
  min_eigen_value: 0.005 # 0.005
  voxel_size: 0.5
  max_layer: 2
  max_points_num: 50
  layer_init_num: [5, 5, 5, 5, 5]

  degeneracy_ratio_thresh: 0.10 # 激光退化判定阈值：法向分布最小/最大特征值比值低于该值视为退化
  degeneracy_min_effective_features: 50 # 参与退化判定的最小有效平面约束数，低于该值直接按退化处理

local_map:  
  map_sliding_en: true
  half_map_size: 50
  sliding_thresh: 4
  long_term_visual_map_en: false # 启用长期稀疏视觉地图：局部地图滑窗时保留有视觉观测的体素
  long_term_visual_max_voxels: 5000 # 长期视觉地图最大体素数，超过后会逐步裁剪以限制内存

adaptive_selector:
  en: true # 自适应视觉选帧总开关：true 开启“退化全帧、非退化关键帧”策略
  keyframe_trans_thresh_min: 0.05 # 平移关键帧最小阈值(米)：激光退化时趋向该值（更容易选中图像帧）
  keyframe_trans_thresh_max: 0.12 # 平移关键帧最大阈值(米)：激光约束充足时趋向该值（更稀疏选帧）
  keyframe_rot_thresh_min_deg: 1.5 # 旋转关键帧最小阈值(度)：退化时降低旋转门限
  keyframe_rot_thresh_max_deg: 3.5 # 旋转关键帧最大阈值(度)：约束充足时提高旋转门限
  keyframe_constraint_ratio_full: 0.2 # 约束强度归一化上限：特征值比值达到该值后按“最稀疏选帧”处理
  keyframe_max_skip_frames: 2 # 最大连续跳过图像帧数，超过后强制选一帧防止长时间无视觉更新

uav:
  imu_rate_odom: false
  gravity_align_en: true

publish:
  dense_map_en: true
  pub_effect_point_en: false 
  pub_plane_en: false
  pub_scan_num: 1
  blind_rgb_points: 0.0

evo:
  seq_name: "CBD_Building_01"
  pose_output_en: false

pcd_save:
  pcd_save_en: true
  save_path: "/home/gulu/data"
  global_map_pub: false    #need to set pcd_save_en true
  colmap_output_en: false # need to set interval = -1
  filter_size_pcd: 0.1
  interval: -1
  # how many LiDAR frames saved in each pcd file;
  # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.

aruco_landmarks:
  aruco_landmarks_en: false
  width: 0.8
  height: 0.6
  marker_size: 0.16
  delta_width_qr_center: 0.28 # Half the distance between the centers of two markers in the horizontal direction 
  delta_height_qr_center: 0.18 # Half the distance between the centers of two markers in the vertical direction
  markers:
    - id: 1
      flag: 0      #0表示该地标的世界坐标无效
      position: [1.0, 2.0, 1.5]
    - id: 2
      flag: 0
      position: [10.0, 2.0, 1.5]
    - id: 3
      flag: 0
      position: [20.0, 2.0, 1.5]
    - id: 4
      flag: 0
      position: [30.0, 2.0, 1.5]
    

